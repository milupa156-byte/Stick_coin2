<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STICK FARM PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; --bg: #050505; --card: rgba(20, 20, 35, 0.9);
            --t: #fff; --g: #00ff88; --r: #ff3366; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, #0a1a3e 0%, #000 70%); z-index: -1; }

        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        
        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 85%; max-width: 340px; padding: 30px; text-align: center; }

        /* UI Elements */
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 800; background: var(--p); color: #000; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }

        /* App Structure */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.5); }
        .h-item { text-align: center; font-size: 9px; color: #666; }
        .h-val { display: block; color: var(--p); font-size: 13px; font-weight: 700; margin-top: 3px; }

        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .view.on { display: block; }

        /* Mining View */
        #bal { font-size: 3rem; font-weight: 900; text-align: center; margin: 30px 0; color: #fff; text-shadow: 0 0 20px var(--p); }
        .m-orb { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--g); margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.3s; }
        .m-orb.active { border-color: var(--r); box-shadow: 0 0 30px rgba(255, 51, 102, 0.4); }

        /* List Items (Friends/Top) */
        .item-card { padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 9px; font-weight: 900; }

        /* Navigation */
        nav { display: grid; grid-template-columns: repeat(5, 1fr); background: #000; border-top: 1px solid #222; padding-bottom: 20px; }
        .tab { padding: 15px 0; text-align: center; font-size: 8px; color: #444; cursor: pointer; transition: 0.3s; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }

        /* Games */
        .game-card { padding: 20px; text-align: center; border: 1px dashed var(--p); margin-top: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box glass">
            <h2>STICK<span style="color:var(--p)">FARM</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn" class="btn">CONNECT</button>
            <p id="tlink" style="margin-top:15px; font-size:10px; color:#555; cursor:pointer;">СТВОРІТЬ НОВУ ФЕРМУ</p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="h-item">БАЛАНС<span id="h-bal" class="h-val">0.00</span></div>
            <div class="h-item">LVL<span id="h-lvl" class="h-val">1</span></div>
            <div class="h-item">NODES<span id="h-nodes" class="h-val">0</span></div>
        </div>

        <div id="v-mine" class="view on">
            <div id="bal">0.00000</div>
            <div id="mbtn" class="m-orb">START</div>
            <p id="m-msg" style="text-align:center; margin-top:30px; font-size:10px; letter-spacing:2px; color:var(--g);">READY</p>
        </div>

        <div id="v-social" class="view">
            <h4 style="margin:0 0 15px 0">ТОП ГРАВЦІВ</h4>
            <div id="leaderboard"></div>
        </div>

        <div id="v-tx" class="view">
            <h4>ПЕРЕКАЗ STK</h4>
            <div class="glass" style="padding:15px">
                <input type="text" id="tx-to" placeholder="ЛОГІН ОТРИМУВАЧА">
                <input type="number" id="tx-amt" placeholder="СУМА">
                <button onclick="sendSTK()" class="btn">ВІДПРАВИТИ</button>
            </div>
        </div>

        <div id="v-games" class="view">
            <h4>DOUBLE OR NOTHING</h4>
            <div class="glass game-card">
                <p style="font-size:10px; color:#777">Шанс 50% подвоїти ставку</p>
                <input type="number" id="bet-amt" placeholder="СТАВКА">
                <button onclick="playDouble()" class="btn" style="background:var(--gold)">ГРАТИ</button>
            </div>
        </div>

        <div id="v-settings" class="view">
            <h4>SYSTEM</h4>
            <div class="glass item-card"><span>ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <button onclick="logout()" class="btn" style="background:var(--r); color:#fff; margin-top:20px;">EXIT</button>
        </div>

        <nav>
            <div class="tab on" id="t-mine">MINE</div>
            <div class="tab" id="t-social">SOCIAL</div>
            <div class="tab" id="t-tx">SEND</div>
            <div class="tab" id="t-games">GAMES</div>
            <div class="tab" id="t-settings">OS</div>
        </nav>
    </div>

    <script>
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
        let db = {users:{}}, cur = null, cloud = 0, loc = 0, isM = false, isReg = false;

        window.onload = () => {
            const u = localStorage.getItem('s_u'), p = localStorage.getItem('s_p');
            if(u && p) login(u, p, true);
            document.getElementById('tlink').onclick = () => {
                isReg = !isReg;
                document.getElementById('abtn').innerText = isReg ? "CREATE" : "CONNECT";
            };
            document.getElementById('abtn').onclick = () => {
                login(document.getElementById('u').value.trim().toLowerCase(), document.getElementById('p').value, false);
            };
        };
