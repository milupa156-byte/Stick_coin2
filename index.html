<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STICK FARM ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; --p-dark: #0044ff;
            --bg: #050505; --card: rgba(20, 20, 35, 0.85);
            --t: #ffffff; --g: #00ff88; --r: #ff3366; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Background Animation */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0a0a2e 0%, #000 50%, #1a0a2e 100%);
            z-index: -1; opacity: 0.8;
        }

        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 88%; max-width: 340px; padding: 40px 25px; text-align: center; }
        h2 { font-weight: 900; letter-spacing: 3px; margin-bottom: 25px; font-size: 24px; }

        input { width: 100%; padding: 14px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; transition: 0.3s; }
        input:focus { border-color: var(--p); box-shadow: 0 0 15px rgba(7,255,255,0.2); }
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; background: var(--p); color: #000; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .main-btn:hover { background: #fff; transform: translateY(-2px); }

        /* App */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.4); border-bottom: 1px solid #222; }
        .h-item { text-align: center; }
        .h-label { font-size: 9px; color: #777; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .h-val { font-size: 14px; color: var(--p); font-weight: 600; }

        /* Mining View */
        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .view.on { display: block; animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #bal { font-size: 3.2rem; font-weight: 900; margin: 40px 0 10px 0; text-align: center; background: linear-gradient(to bottom, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lvl-bar { width: 150px; height: 4px; background: #222; margin: 0 auto 40px auto; border-radius: 2px; overflow: hidden; }
        #lvl-progress { height: 100%; width: 0%; background: var(--p); transition: 0.5s; }

        /* Central Orb */
        .orb-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .m-orb { width: 170px; height: 170px; border-radius: 50%; border: 4px solid var(--g); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; position: relative; z-index: 5; }
        .m-orb::after { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 2px solid var(--g); opacity: 0.3; animation: pulse 2s infinite; }
        .m-orb.active { border-color: var(--r); color: var(--r); }
        .m-orb.active::after { border-color: var(--r); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.3); opacity: 0; } }

        /* Social/Top */
        .top-item { padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .rank { width: 30px; font-weight: 900; color: var(--p); }
        .u-info { flex: 1; }
        .u-name { font-size: 14px; font-weight: 600; }
        .u-bal { font-size: 12px; color: var(--g); }

        /* Nav */
        nav { display: flex; background: #000; padding: 10px 0 30px 0; border-top: 1px solid #222; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; transition: 0.3s; position: relative; }
        .tab svg { width: 24px; height: 24px; fill: #444; transition: 0.3s; }
        .tab.on svg { fill: var(--p); filter: drop-shadow(0 0 5px var(--p)); }
        .tab.on::after { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: var(--p); border-radius: 0 0 5px 5px; }
    </style>
</head>

        <div class="auth-box glass">
            <h2>STICK<span style="color:var(--p)">FARM</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН" spellcheck="false">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn" class="main-btn">УВІЙТИ</button>
            <div id="tlink" style="margin-top:20px; font-size:10px; color:#555; cursor:pointer;">НЕМАЄ АКАУНТА? СТВОРИТИ</div>
        </div>
    </div>

        </div>

            <div id="leaderboard"></div>
        </div>
