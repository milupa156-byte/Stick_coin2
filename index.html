<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STICK FARM PRO ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; --bg: #030303; --card: rgba(15, 15, 25, 0.95);
            --t: #ffffff; --g: #00ff88; --r: #ff3366; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Анімований фон */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 0%, #0a1a3e 0%, #000 70%);
            z-index: -1;
        }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }

        /* Екран входу */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 85%; max-width: 340px; padding: 40px 25px; text-align: center; }
        h2 { font-weight: 900; letter-spacing: 4px; margin-bottom: 25px; font-size: 22px; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 14px; }
        input:focus { border-color: var(--p); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; background: var(--p); color: #000; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.96); }

        /* Основний інтерфейс */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.6); border-bottom: 1px solid #222; }
        .h-item { text-align: center; }
        .h-label { font-size: 8px; color: #666; letter-spacing: 1px; display: block; }
        .h-val { font-size: 13px; color: var(--p); font-weight: 700; }

        /* Вкладки */
        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .view.on { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Майнінг */
        #bal { font-size: 3.2rem; font-weight: 900; text-align: center; margin: 30px 0; background: linear-gradient(#fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .m-orb { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--g); margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; position: relative; }
        .m-orb.active { border-color: var(--r); box-shadow: 0 0 40px rgba(255, 51, 102, 0.3); }
        .m-orb::after { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 1px solid var(--g); opacity: 0.2; }

        /* Картки списків */
        .item-card { padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .badge { background: #111; padding: 4px 8px; border-radius: 6px; font-size: 9px; color: var(--p); border: 1px solid #222; }

        /* Азартні ігри */
        .game-zone { padding: 25px; text-align: center; border: 2px dashed #222; margin-top: 10px; }

        /* Навігація */
        nav { display: grid; grid-template-columns: repeat(5, 1fr); background: #000; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom); }
        .tab { padding: 15px 0; text-align: center; font-size: 8px; color: #444; cursor: pointer; }
        .tab.on { color: var(--p); border-top: 3px solid var(--p); background: linear-gradient(to bottom, rgba(7,255,255,0.05), transparent); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box glass">
            <h2>STICK<span style="color:var(--p)">FARM</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН" autocomplete="off">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn" class="btn">CONNECT</button>
            <div id="tlink" style="margin-top:20px; font-size:10px; color:#555; cursor:pointer;">НЕМАЄ АКАУНТА? РЕЄСТРАЦІЯ</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="h-item"><span class="h-label">БАЛАНС</span><span id="h-bal" class="h-val">0.00</span></div>
            <div class="h-item"><span class="h-label">РІВЕНЬ</span><span id="h-lvl" class="h-val">1</span></div>
            <div class="h-item"><span class="h-label">ВУЗЛИ</span><span id="h-nodes" class="h-val">0</span></div>
        </div>

        <div id="v-mine" class="view on">
            <div id="bal">0.00000</div>
            <div id="mbtn" class="m-orb"><span id="m-status" style="font-weight:900; letter-spacing:2px;">START</span></div>
            <p id="m-msg" style="text-align:center; margin-top:40px; font-size:10px; color:var(--g); letter-spacing:1px;">READY TO OPERATE</p>
        </div>

        <div id="v-social" class="view">
            <h4 style="margin-bottom:15px">ТОП ФЕРМЕРІВ</h4>
            <div id="leaderboard"></div>
        </div>

        <div id="v-tx" class="view">
            <h4>P2P ПЕРЕКАЗ</h4>
            <div class="glass" style="padding:20px">
                <input type="text" id="tx-to" placeholder="ЛОГІН ОТРИМУВАЧА">
                <input type="number" id="tx-amt" placeholder="КІЛЬКІСТЬ STK">
                <button onclick="sendSTK()" class="btn" style="margin-top:10px">ВІДПРАВИТИ</button>
            </div>
            <p style="font-size:10px; color:#444; margin-top:15px; text-align:center;">Комісія мережі: 0%</p>
        </div>

        <div id="v-games" class="view">
            <h4>DOUBLE OR NOTHING</h4>
            <div class="glass game-zone">
                <p style="font-size:11px; margin-bottom:20px; color:#888;">Встанови ставку. Шанс 50/50.</p>
                <input type="number" id="bet-amt" placeholder="СТАВКА STK">
                <button onclick="playDouble()" class="btn" style="background:var(--gold); margin-top:10px;">ГРАТИ</button>
            </div>
        </div>

        <div id="v-os" class="view">
            <h4>OS STATUS</h4>
            <div class="glass item-card"><span>NODE ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <div class="glass item-card"><span>NETWORK:</span> <span style="color:var(--g)">ENCRYPTED</span></div>
